name: CI – Test Coverage Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  test-coverage:
    name: Run Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Prepare google-services.json
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "✅  Decoding google-services.json from secret…"
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json
            grep -q '"project_info"' app/google-services.json
          else
            echo "ℹ️  Secret missing – using stub google-services.json"
            printf '%s\n' \
              '{' \
              '  "project_info": {' \
              '    "project_number": "000000000000",' \
              '    "project_id": "stub-project"' \
              '  }' \
              '}' > app/google-services.json
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate keys.properties
        run: |
          echo "BEARER_TOKEN=${{ secrets.BEARER_TOKEN }}" > keys.properties

      - name: Run unit tests + Kover
        run: ./gradlew test koverVerify koverXmlReport koverHtmlReport
