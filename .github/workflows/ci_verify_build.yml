name: CI - Verify build

on:
  pull_request:
    branches: [main, development]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: 🛠️ Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/settings.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-
            gradle-cache-

      - name: Prepare google-services.json
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "✅  Decoding google-services.json from secret…"
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json
            grep -q '"project_info"' app/google-services.json
          else
            echo "ℹ️  Secret missing – using stub google-services.json"
            printf '%s\n' \
              '{' \
              '  "project_info": {' \
              '    "project_number": "000000000000",' \
              '    "project_id": "stub-project"' \
              '  }' \
              '}' > app/google-services.json
          fi

      - name: Create keys.properties
        run: |
          echo "BEARER_TOKEN=${{ secrets.BEARER_TOKEN }}" > keys.properties

      - name: Setup Gradlew
        run: chmod +x ./gradlew

      - name: Build (assembleDebug)
        run: ./gradlew assembleDebug

      - name: Build without tests
        run: ./gradlew assemble -x lintVitalRelease -x lint
