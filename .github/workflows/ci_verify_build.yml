name: CI - Publish Release Build

on:
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: 🛠️ Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/settings.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-
            gradle-cache-

      - name: Create keys.properties
        run: |
          echo "BEARER_TOKEN=${{ secrets.BEARER_TOKEN }}" > keys.properties
          mkdir -p data
          echo "TMDB_API_KEY=\"${{ secrets.TMDB_API_KEY }}\"" > data/keys.properties

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json


      - name: Create Keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -d > my-release-key.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > gradle.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> gradle.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> gradle.properties
          echo "storeFile=$(pwd)/my-release-key.jks" >> gradle.properties

      - name: Setup Gradlew
        run: chmod +x ./gradlew

      - name: Build (assembleRelease)
        run: ./gradlew assembleRelease --stacktrace --info

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7
