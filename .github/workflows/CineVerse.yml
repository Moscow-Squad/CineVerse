name: CI/CD - Build, Coverage

on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ develop ]
permissions:
  checks: write
  pull-requests: write
  contents: write

jobs:
  build:
    name: 🛠️ build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (assembleDebug)
        run: ./gradlew assembleDebug

  test_coverage:
    name: ✅ Unit Test & Coverage Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew test


      - name: Verify JaCoCo Coverage
        run: ./gradlew jacocoTestCoverageVerification
