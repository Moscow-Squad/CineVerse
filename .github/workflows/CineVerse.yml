name: CI/CD - Build, Coverage

on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ develop ]
permissions:
  checks: write
  pull-requests: write
  contents: write

jobs:
  build:
    name: 🛠️ build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (assembleDebug)
        run: ./gradlew assembleDebug

  test_coverage:
    name: ✅ Check Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run Coverage
        run: |
          chmod +x gradlew
          ./gradlew testCoverage

      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/build/reports/jacoco/testCoverage/testCoverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60

  deploy:
    name: 📱 Distribute Debug APK to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: [build, test_coverage]
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

      - name: Save Service Account Key
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > service-account-key.json

      - name: Set Release Notes
        id: set-release-notes
        run: |
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                echo "RELEASE_NOTES=PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" >> $GITHUB_ENV
              else
                echo "RELEASE_NOTES=Push to develop: ${{ github.sha }}" >> $GITHUB_ENV
              fi

      - name: Distribute Debug APK to Firebase App Distribution
        run: ./gradlew appDistributionUploadDebug --stacktrace
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
